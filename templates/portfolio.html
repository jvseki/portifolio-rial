<section class="portfolio container fade-in">
    <h3>Portfólio Dinâmico</h3>
    <div class="portfolio-grid">
        {% if items %}
            {% for item in items %}
                <div class="portfolio-wrapper">
                    {% if "youtube.com" in item.link or "youtu.be" in item.link %}
                        <iframe src="{{ item.link }}" class="portfolio-item" frameborder="0" allowfullscreen loading="lazy"></iframe>
                    {% else %}
                        <img src="{{ item.link }}" class="portfolio-item" alt="Portfólio" loading="lazy" onerror="this.style.display='none'">
                    {% endif %}
                </div>
            {% endfor %}
        {% else %}
            <p style="color: #888;">Nenhum item encontrado na planilha no momento.</p>
        {% endif %}
    </div>
</section>
