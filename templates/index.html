<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTHS.PUBLI | Portfólio</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="hero">
        <div class="container fade-in">
            <img src="{{ url_for('static', filename='img/logo.jpg') }}" alt="Logo MTHS.PUBLI" class="brand-logo">
            <h1>MTHS.PUBLI</h1>
            <p class="tagline">Transformando ideias em comunicação.</p>
        </div>
    </header>

    <section class="portfolio container fade-in">
        <div class="portfolio-grid">
            {% for item in items %}
                {% if "youtube.com" in item.Link or "youtu.be" in item.Link %}
                    <iframe src="{{ item.Link }}" class="portfolio-item" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen" allowfullscreen></iframe>
                {% elif "drive.google.com" in item.Link %}
                    <iframe src="{{ item.Link }}" class="portfolio-item" frameborder="0" allowfullscreen></iframe>
                {% else %}
                    <img src="{{ item.Link }}" alt="Trabalho" class="portfolio-item">
                {% endif %}
            {% endfor %}
        </div>
    </section>

    <section class="contact container fade-in">
        <a href="https://wa.me/5518996893529" class="btn-whatsapp" target="_blank">
            <i class="fa-brands fa-whatsapp"></i> Solicitar Orçamento
        </a>
    </section>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
